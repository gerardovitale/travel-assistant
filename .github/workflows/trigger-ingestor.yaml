name: Trigger Ingestor

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  trigger-ingestor:
    uses: gerardovitale/github-workflows/.github/workflows/trigger-cloud-run-job.yml@v1
    with:
      region: europe-southwest1
      app_name: travass
      component: fuel-ingestor-job
    secrets:
      gcp_credentials: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

  run-aggregation:
    needs: trigger-ingestor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pandas==2.2.3 google-cloud-storage==2.18.2 pyarrow==18.1.0

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Wait for ingestor data
        run: |
          for i in $(seq 1 12); do
            if gsutil ls "gs://travel-assistant-spain-fuel-prices/spain_fuel_prices_$(date -u +%Y-%m-%d)*" 2>/dev/null; then
              echo "Data found"
              exit 0
            fi
            echo "Attempt $i/12: data not ready, waiting 30s..."
            sleep 30
          done
          echo "ERROR: Ingestor data not found after 6 minutes"
          exit 1

      - name: Run aggregation
        working-directory: fuel-ingestor/app
        run: python aggregator.py

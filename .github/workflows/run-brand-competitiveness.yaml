name: Run Brand Competitiveness

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays at 6 AM UTC
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/run-aggregation-reusable.yaml
    with:
      working_directory: fuel-ingestor
      script_path: app/brand_competitiveness.py
    secrets:
      gcp_credentials: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

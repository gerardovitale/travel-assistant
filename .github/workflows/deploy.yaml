name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      force_all:
        description: "Force all jobs to run"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Change detection
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      fuel-ingestor: ${{ steps.filter.outputs.fuel-ingestor }}
      fuel-dashboard: ${{ steps.filter.outputs.fuel-dashboard }}
      infra: ${{ steps.filter.outputs.infra }}
      any-service: ${{ steps.filter.outputs.any-service }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            fuel-ingestor:
              - 'fuel-ingestor/**'
            fuel-dashboard:
              - 'fuel-dashboard/**'
            infra:
              - 'infra/**'
            any-service:
              - 'fuel-ingestor/**'
              - 'fuel-dashboard/**'

  # ---------------------------------------------------------------------------
  # Test jobs
  # ---------------------------------------------------------------------------
  test-fuel-ingestor:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.fuel-ingestor == 'true' ||
      inputs.force_all == true
    uses: gerardovitale/github-workflows/.github/workflows/test-service.yml@v1
    with:
      service: fuel-ingestor

  test-fuel-dashboard:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.fuel-dashboard == 'true' ||
      inputs.force_all == true
    uses: gerardovitale/github-workflows/.github/workflows/test-service.yml@v1
    with:
      service: fuel-dashboard

  # ---------------------------------------------------------------------------
  # Build jobs
  # ---------------------------------------------------------------------------
  build-fuel-ingestor:
    needs: [detect-changes, test-fuel-ingestor]
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.detect-changes.outputs.fuel-ingestor == 'true' ||
        inputs.force_all == true)
    uses: gerardovitale/github-workflows/.github/workflows/build-service.yml@v1
    with:
      service: fuel-ingestor
      image_prefix: "travass-"
      platforms: "linux/amd64,linux/arm64"
      extra_cache_key_files: "uv.lock"
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  build-fuel-dashboard:
    needs: [detect-changes, test-fuel-dashboard]
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.detect-changes.outputs.fuel-dashboard == 'true' ||
        inputs.force_all == true)
    uses: gerardovitale/github-workflows/.github/workflows/build-service.yml@v1
    with:
      service: fuel-dashboard
      image_prefix: "travass-"
      platforms: "linux/amd64,linux/arm64"
      extra_cache_key_files: "uv.lock"
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  # ---------------------------------------------------------------------------
  # Image scanning
  # ---------------------------------------------------------------------------
  scan-fuel-ingestor:
    needs: build-fuel-ingestor
    if: >-
      always() && !failure() && !cancelled() &&
      needs.build-fuel-ingestor.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/travass-fuel-ingestor:${{ steps.vars.outputs.short_sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          trivyignores: ".trivyignore"

  scan-fuel-dashboard:
    needs: build-fuel-dashboard
    if: >-
      always() && !failure() && !cancelled() &&
      needs.build-fuel-dashboard.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/travass-fuel-dashboard:${{ steps.vars.outputs.short_sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          trivyignores: ".trivyignore"

  # ---------------------------------------------------------------------------
  # Terraform deploy
  # ---------------------------------------------------------------------------
  terraform-deploy:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-fuel-ingestor
      - build-fuel-dashboard
      - scan-fuel-ingestor
      - scan-fuel-dashboard
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.detect-changes.outputs.any-service == 'true' ||
        needs.detect-changes.outputs.infra == 'true' ||
        inputs.force_all == true)
    env:
      TF_VAR_APP_NAME: travass
      TF_VAR_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_REGION: europe-southwest1
      TF_VAR_DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: 1.10.4

      - name: Terraform fmt
        run: terraform fmt -check
        continue-on-error: false

      - name: Initialize Terraform
        working-directory: ./infra
        run: terraform init

      - name: Determine Docker image tags
        id: tags
        working-directory: ./infra
        run: |
          FORCE="${{ inputs.force_all }}"

          current_tag() {
            terraform output -raw "$1" 2>/dev/null || echo "${GITHUB_SHA::7}"
          }

          resolve_tag() {
            local KEY="$1" CHANGED="$2"
            if [[ "$CHANGED" == "true" || "$FORCE" == "true" ]]; then
              echo "${GITHUB_SHA::7}"
            else
              current_tag "docker_image_tag_$(echo "$KEY" | tr '[:upper:]' '[:lower:]')"
            fi
          }

          {
            echo "tag_FUEL_INGESTOR=$(resolve_tag FUEL_INGESTOR '${{ needs.detect-changes.outputs.fuel-ingestor }}')"
          } >> "$GITHUB_OUTPUT"

      - name: Plan Terraform changes
        working-directory: ./infra
        run: terraform plan -input=false -var "DOCKER_IMAGE_TAG=${{ steps.tags.outputs.tag_FUEL_INGESTOR }}"

      - name: Apply Terraform changes
        working-directory: ./infra
        run: terraform apply -auto-approve -input=false -var "DOCKER_IMAGE_TAG=${{ steps.tags.outputs.tag_FUEL_INGESTOR }}"

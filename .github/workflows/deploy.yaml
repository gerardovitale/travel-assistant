name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      force_all:
        description: "Force all jobs to run"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Change detection
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      spain-fuel-fetcher: ${{ steps.filter.outputs.spain-fuel-fetcher }}
      fuel-ingestor: ${{ steps.filter.outputs.fuel-ingestor }}
      fuel-dashboard: ${{ steps.filter.outputs.fuel-dashboard }}
      infra: ${{ steps.filter.outputs.infra }}
      any-service: ${{ steps.filter.outputs.any-service }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            spain-fuel-fetcher:
              - 'spain-fuel-fetcher/**'
              - 'uv.lock'
              - 'pyproject.toml'
            fuel-ingestor:
              - 'fuel-ingestor/**'
              - 'spain-fuel-fetcher/**'
              - 'uv.lock'
              - 'pyproject.toml'
            fuel-dashboard:
              - 'fuel-dashboard/**'
              - 'spain-fuel-fetcher/**'
              - 'uv.lock'
              - 'pyproject.toml'
            infra:
              - 'infra/**'
            any-service:
              - 'fuel-ingestor/**'
              - 'fuel-dashboard/**'
              - 'spain-fuel-fetcher/**'
              - 'uv.lock'
              - 'pyproject.toml'

  # ---------------------------------------------------------------------------
  # Test jobs
  #
  # Inlined (not the shared github-workflows reusable workflow) because the
  # uv workspace requires the Docker build context to be the repo root so the
  # shared spain-fuel-fetcher package and root uv.lock are reachable.
  # ---------------------------------------------------------------------------
  test-spain-fuel-fetcher:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.spain-fuel-fetcher == 'true' ||
      inputs.force_all == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and run tests
        run: |
          docker buildx build --load -f spain-fuel-fetcher/Dockerfile.test -t spain-fuel-fetcher-test .
          docker run --rm spain-fuel-fetcher-test

  test-fuel-ingestor:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.fuel-ingestor == 'true' ||
      inputs.force_all == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and run tests
        run: |
          docker buildx build --load -f fuel-ingestor/Dockerfile.test -t fuel-ingestor-test .
          docker run --rm fuel-ingestor-test

  test-fuel-dashboard:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.fuel-dashboard == 'true' ||
      inputs.force_all == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and run tests
        run: |
          docker buildx build --load -f fuel-dashboard/Dockerfile.test -t fuel-dashboard-test .
          docker run --rm fuel-dashboard-test

  # ---------------------------------------------------------------------------
  # Build jobs (multi-arch, build context = repo root)
  # ---------------------------------------------------------------------------
  build-fuel-dashboard:
    needs: [detect-changes, test-spain-fuel-fetcher, test-fuel-dashboard]
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.detect-changes.outputs.fuel-dashboard == 'true' ||
        inputs.force_all == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
      - name: Compute short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: fuel-dashboard/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/travass-fuel-dashboard:${{ steps.vars.outputs.short_sha }}
            ${{ secrets.DOCKER_USERNAME }}/travass-fuel-dashboard:latest
          cache-from: type=gha,scope=fuel-dashboard
          cache-to: type=gha,mode=max,scope=fuel-dashboard

  # ---------------------------------------------------------------------------
  # Image scanning
  # ---------------------------------------------------------------------------
  scan-fuel-dashboard:
    needs: build-fuel-dashboard
    if: >-
      always() && !failure() && !cancelled() &&
      needs.build-fuel-dashboard.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/travass-fuel-dashboard:${{ steps.vars.outputs.short_sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          trivyignores: ".trivyignore"

  # ---------------------------------------------------------------------------
  # Terraform deploy
  # ---------------------------------------------------------------------------
  terraform-deploy:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-fuel-dashboard
      - scan-fuel-dashboard
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.detect-changes.outputs.any-service == 'true' ||
        needs.detect-changes.outputs.infra == 'true' ||
        inputs.force_all == true)
    env:
      TF_VAR_APP_NAME: travass
      TF_VAR_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_REGION: europe-southwest1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: 1.10.4

      - name: Terraform fmt
        run: terraform fmt -check
        continue-on-error: false

      - name: Initialize Terraform
        working-directory: ./infra
        run: terraform init

      - name: Plan Terraform changes
        working-directory: ./infra
        run: terraform plan -input=false

      - name: Apply Terraform changes
        working-directory: ./infra
        run: terraform apply -auto-approve -input=false

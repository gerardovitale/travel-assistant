name: Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:

  check-changes-on-main-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Set up output for build-docker-image
        id: check_changes
        run: |
          # Check if there are changes in the 'specific-folder' directory or specific files
          if git diff --quiet HEAD~1 HEAD -- travel_assistant Dockerfile poetry.lock pyproject.toml; then
            echo "changes=false" >> $GITHUB_ENV
          else
            echo "changes=true" >> $GITHUB_ENV
          fi

      - name: Set output
        id: set_output
        run: echo "::set-output name=changes::$changes"

  build-docker-image:
    runs-on: ubuntu-latest
    needs: check-changes-on-main-package
    if: needs.check-changes-on-main-package.outputs.changes == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/travel-assistant-update-fuel-prices:latest

  terraform-deploy:
    runs-on: ubuntu-latest
    env:
      TF_VAR_PREFIX: travass
      TF_VAR_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_REGION: europe-west1
      TF_VAR_REPO_NAME: travel-assistant
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      # - name: Authenticate to Google Cloud
      #   id: auth
      #   uses: google-github-actions/auth@v2.1.3
      #   with:
      #     workload_identity_provider: ${{ secrets.GCP_IDENTITY_POOL_PROVIDER }}
      #     service_account: ${{ secrets.GPC_SERVICE_ACCOUNT_EMAIL }}
      
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2.1.3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Terraform
        id: setup-tf
        uses: hashicorp/setup-terraform@v3.1.1
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Initialize Terraform
        id: init
        working-directory: ./deploy
        run: terraform init

      - name: Plan Terraform changes
        id: plan
        working-directory: ./deploy
        run: terraform plan

      - name: Apply Terraform changes
        id: apply
        working-directory: ./deploy
        run: terraform apply -auto-approve

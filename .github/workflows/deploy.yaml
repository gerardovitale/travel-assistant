name: Deploy

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

jobs:
  test-fuel-ingestor:
    uses: gerardovitale/github-workflows/.github/workflows/test-service.yml@v1
    with:
      service: fuel-ingestor

  test-fuel-dashboard:
    uses: gerardovitale/github-workflows/.github/workflows/test-service.yml@v1
    with:
      service: fuel-dashboard

  build-fuel-ingestor:
    needs: test-fuel-ingestor
    uses: gerardovitale/github-workflows/.github/workflows/build-service.yml@v1
    with:
      service: fuel-ingestor
      image_prefix: "travass-"
      platforms: "linux/amd64,linux/arm64"
      extra_cache_key_files: "uv.lock"
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  build-fuel-dashboard:
    needs: test-fuel-dashboard
    uses: gerardovitale/github-workflows/.github/workflows/build-service.yml@v1
    with:
      service: fuel-dashboard
      image_prefix: "travass-"
      platforms: "linux/amd64,linux/arm64"
      extra_cache_key_files: "uv.lock"
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  terraform-deploy:
    runs-on: ubuntu-latest
    needs: [build-fuel-ingestor, build-fuel-dashboard]
    env:
      TF_VAR_APP_NAME: travass
      TF_VAR_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_REGION: europe-southwest1
      TF_VAR_DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: 1.10.4

      - name: Terraform fmt
        run: terraform fmt -check
        continue-on-error: false

      - name: Initialize Terraform
        working-directory: ./infra
        run: terraform init

      - name: Plan Terraform changes
        working-directory: ./infra
        run: terraform plan -input=false -var "DOCKER_IMAGE_TAG=${GITHUB_SHA::7}"

      - name: Apply Terraform changes
        working-directory: ./infra
        run: terraform apply -auto-approve -input=false -var "DOCKER_IMAGE_TAG=${GITHUB_SHA::7}"

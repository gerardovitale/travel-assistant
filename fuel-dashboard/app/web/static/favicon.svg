<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003d9b"/>
      <stop offset="100%" stop-color="#00296d"/>
    </linearGradient>
  </defs>
  <!-- Pump body -->
  <rect class="fc" x="2" y="4" width="17" height="25" rx="2" fill="url(#g)"/>
  <!-- Display window -->
  <rect x="5" y="7" width="11" height="7" rx="1" fill="white" opacity="0.3"/>
  <!-- Nozzle arm: right then down -->
  <path class="fs" d="M19 10 H26 V18" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Nozzle head -->
  <rect class="fc" x="22" y="17" width="5.5" height="4" rx="1" fill="url(#g)"/>
  <style>
    @media (prefers-color-scheme: dark) {
      .fc { fill: #5b8df5; }
      .fs { stroke: #5b8df5; }
    }
  </style>

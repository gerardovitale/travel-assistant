{# Reusable share button. Pair with static data-share-* attrs or a registered JS builder (share.js).
   Usage: {% from "_share_button.html" import share_button %} then {{ share_button("sec-key") }} #}
{% macro share_button(key, label="Compartir", title="", text="", url="") %}
<span class="relative inline-flex" data-share-anchor>
  <button type="button"
    class="inline-flex items-center justify-center w-9 h-9 rounded-full text-outline hover:text-primary-container hover:bg-surface-container transition-colors"
    aria-label="{{ label }}" title="{{ label }}"
    aria-haspopup="menu" aria-expanded="false"
    data-share="{{ key }}"
    {% if title %}data-share-title="{{ title }}"{% endif %}
    {% if text %}data-share-text="{{ text }}"{% endif %}
    {% if url %}data-share-url="{{ url }}"{% endif %}>
    <span class="material-symbols-outlined text-[20px]">ios_share</span>
  </button>
</span>
{% endmacro %}

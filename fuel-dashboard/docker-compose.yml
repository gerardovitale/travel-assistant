services:
  fuel-dashboard:
    image: gerardovitale/travass-fuel-dashboard:latest
    container_name: fuel-dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DASHBOARD_GCP_PROJECT_ID=travel-assistant-417315
      - DASHBOARD_GCS_BUCKET_NAME=travel-assistant-spain-fuel-prices
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcs-fuel-dashboard-credentials.json
    volumes:
      - ./gcs-fuel-dashboard-credentials.json:/secrets/gcs-fuel-dashboard-credentials.json:ro
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

services:
  fuel-dashboard:
    image: gerardovitale/travass-fuel-dashboard:latest
    container_name: fuel-dashboard
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - DASHBOARD_GCP_PROJECT_ID=travel-assistant-417315
      - DASHBOARD_GCS_BUCKET_NAME=travel-assistant-spain-fuel-prices
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcs-fuel-dashboard-credentials.json
    volumes:
      - ./gcs-fuel-dashboard-credentials.json:/secrets/gcs-fuel-dashboard-credentials.json:ro
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      kuma.fuel-dashboard.http.name: "Fuel Dashboard"
      kuma.fuel-dashboard.http.url: "http://fuel-dashboard:8080/health"
      kuma.fuel-dashboard.http.interval: "60"
      kuma.fuel-dashboard.http.retryInterval: "30"
      kuma.fuel-dashboard.http.maxretries: "3"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    labels:
      kuma.fuel-ingestor-data.http.name: "Fuel Ingestor Data Freshness"
      kuma.fuel-ingestor-data.http.url: "http://fuel-dashboard:8080/health/data"
      kuma.fuel-ingestor-data.http.interval: "3600"
      kuma.fuel-ingestor-data.http.retryInterval: "300"
      kuma.fuel-ingestor-data.http.maxretries: "3"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  autokuma:
    image: ghcr.io/bigboot/autokuma:latest
    container_name: autokuma
    restart: unless-stopped
    environment:
      - AUTOKUMA__KUMA__URL=http://uptime-kuma:3001
      - AUTOKUMA__KUMA__USERNAME=${UPTIME_KUMA_USERNAME}
      - AUTOKUMA__KUMA__PASSWORD=${UPTIME_KUMA_PASSWORD}
      - AUTOKUMA__DOCKER__SOCKET_PATH=/var/run/docker.sock
      - AUTOKUMA__TAG=autokuma
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - uptime-kuma
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - DOCKER_API_VERSION=1.40
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      fuel-dashboard:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  uptime-kuma-data:

services:
  fuel-dashboard:
    image: gerardovitale/travass-fuel-dashboard:latest
    container_name: fuel-dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DASHBOARD_GCP_PROJECT_ID=travel-assistant-417315
      - DASHBOARD_GCS_BUCKET_NAME=travel-assistant-spain-fuel-prices
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcs-credentials.json
    volumes:
      - ./gcs-credentials.json:/secrets/gcs-credentials.json:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
